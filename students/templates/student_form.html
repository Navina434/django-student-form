<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background:#f4f7fc;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:100%;
            max-width:450px;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#2563eb;
        }

        p{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#2563eb;
            box-shadow:0 0 5px rgba(37,99,235,0.3);
        }

        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        .success{
            color:green;
            text-align:center;
            margin-bottom:15px;
        }

        .errorlist{
            color:red;
            list-style:none;
            margin-top:5px;
            font-size:14px;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>Student Registration Form</h2>

    {% if success %}
        <p class="success">
            Form Submitted Successfully!
        </p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Register
        </button>

    </form>

</div>

</body>
</html>
